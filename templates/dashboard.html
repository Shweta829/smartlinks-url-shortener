<!DOCTYPE html>
<html>
<head>

<title>SmartLinks Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="dashboard-container">
  <nav class="navbar">
    <a href="/dashboard" class="logo">🔗 SmartLinks</a>
    <div class="nav-links">
      <a href="/analytics" class="nav-link">📊 Analytics</a>
      <span class="user-info" id="userInfo"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="dashboard-main">
    <div class="dashboard-card">
      <h1>Create Short URL</h1>
      <p class="subtitle">Paste your long URL to create a shortened link</p>

      <form id="shortenForm" class="shorten-form">
        <div class="input-group">
          <label for="urlInput">Long URL</label>
          <div class="input-wrapper">
            <input 
              type="url" 
              id="urlInput" 
              placeholder="https://example.com/very/long/url" 
              required
            >
            <span class="input-icon" id="urlIcon"></span>
            <span class="validation-msg" id="urlError"></span>
          </div>
        </div>

        <div class="url-display" id="shortUrlSection" style="display: none;">
          <label>Short URL</label>
          <div class="url-box">
            <input type="text" id="shortUrl" readonly class="url-input" />
            <button type="button" class="copy-btn" title="Copy to clipboard">
              <span class="copy-icon">📋</span>
            </button>
          </div>
        </div>

        <div class="form-message" id="formMessage"></div>

        <button type="submit" class="btn-primary" id="shortenBtn">
          <span class="btn-text">Generate Short Link</span>
          <span class="btn-loader" id="btnLoader"></span>
        </button>
      </form>
    </div>

    <div class="results-section">
      <div id="historySection" style="display: none;">
        <h2>Recent Shortened URLs</h2>
        <div class="history-list" id="historyList"></div>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

</body>
</html>
