<!DOCTYPE html>
<html>
<head>

<title>Forgot Password</title>

<link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<h2>Reset Password</h2>

<form id="forgotForm" class="form-container">

<div class="step" id="step1">
<p style="color: #a78bfa; margin-bottom: 20px; font-size: 14px;">Enter your email to receive a reset link</p>

<div class="input-group">
<label for="email">Email Address</label>
<input id="email" placeholder="Enter your email" type="email" required>
<span class="error-message" id="email-error"></span>
<span class="success-icon" id="email-success">✓</span>
</div>

<div class="form-message" id="formMessage"></div>

<button type="submit" class="auth-btn" id="submitBtn">Send Reset Link</button>
</div>

<div class="step" id="step2" style="display: none;">
<p style="color: #a78bfa; margin-bottom: 20px; font-size: 14px;">Enter your new password</p>

<div class="input-group">
<label for="new-password">New Password</label>
<div class="password-wrapper">
<input id="new-password" type="password" placeholder="Enter new password" required>
<button type="button" class="toggle-password" id="togglePassword">👁️</button>
</div>
<div class="password-strength-meter">
<div class="strength-bar" id="strengthBar"></div>
<span class="strength-label" id="strengthLabel">Password strength</span>
</div>
<span class="error-message" id="new-password-error"></span>
</div>

<div class="input-group">
<label for="confirm-new-password">Confirm Password</label>
<div class="password-wrapper">
<input id="confirm-new-password" type="password" placeholder="Confirm new password" required>
<button type="button" class="toggle-password" id="toggleConfirmPassword">👁️</button>
</div>
<span class="error-message" id="confirm-new-password-error"></span>
<span class="success-icon" id="confirm-new-password-success">✓</span>
</div>

<div class="form-message" id="formMessage2"></div>

<button type="button" class="auth-btn" id="resetPasswordBtn">Update Password</button>
</div>

</form>

<div class="auth-links">
Remember your password?
<a href="/login" class="auth-link">Sign In</a>
</div>

<div class="auth-links">
Don't have account?
<a href="/register" class="auth-link">Create Account</a>
</div>

</div>

</div>

<script src="/static/js/forgot_password.js"></script>

</body>
</html>
