<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<h2>Create Account</h2>

<form id="registerForm" class="form-container">

<div class="input-group">
<label for="username">Full Name</label>
<input id="username" placeholder="Full Name" type="text" required>
<span class="error-message" id="username-error"></span>
<span class="success-icon" id="username-success">✓</span>
</div>

<div class="input-group">
<label for="email">Email</label>
<input id="email" placeholder="Email" type="email" required>
<span class="error-message" id="email-error"></span>
<span class="success-icon" id="email-success">✓</span>
</div>

<div class="input-group">
<label for="password">Password</label>
<div class="password-wrapper">
<input id="password" type="password" placeholder="Password" required>
<button type="button" class="toggle-password" id="togglePassword">👁️</button>
</div>
<div class="password-strength-meter">
<div class="strength-bar" id="strengthBar"></div>
<span class="strength-label" id="strengthLabel">Password strength</span>
</div>
<span class="error-message" id="password-error"></span>
</div>

<div class="input-group">
<label for="confirm-password">Confirm Password</label>
<div class="password-wrapper">
<input id="confirm-password" type="password" placeholder="Confirm Password" required>
<button type="button" class="toggle-password" id="toggleConfirmPassword">👁️</button>
</div>
<span class="error-message" id="confirm-password-error"></span>
<span class="success-icon" id="confirm-password-success">✓</span>
</div>

<div class="form-message" id="formMessage"></div>

<button type="submit" class="auth-btn" id="submitBtn">Sign Up</button>

</form>

<div class="auth-links">
Already have account?
<a href="/login">Login</a>
</div>

</div>

</div>

<script src="/static/js/register.js"></script>

</body>
</html>
